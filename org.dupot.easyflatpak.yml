app-id: org.dupot.easyflatpak
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: dupot_easy_flatpak
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak
  - --share=network
  - --filesystem=xdg-download

modules:
  - name: dupot_easy_flatpak
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/dupot_easy_flatpak
      - cp -R src/ /app/share/dupot_easy_flatpak/
      - mkdir -p /app/bin
      - install -Dm755 dupot_easy_flatpak.sh /app/bin/dupot_easy_flatpak
      - install -Dm644 export/flatpak/${FLATPAK_ID}.appdata.xml /app/share/appdata/${FLATPAK_ID}.appdata.xml
      - install -Dm644 export/flatpak/16x16.png $FLATPAK_DEST/share/icons/hicolor/16x16/apps/org.dupot.easyflatpak.png
      - install -Dm644 export/flatpak/24x24.png $FLATPAK_DEST/share/icons/hicolor/24x24/apps/org.dupot.easyflatpak.png
      - install -Dm644 export/flatpak/32x32.png $FLATPAK_DEST/share/icons/hicolor/32x32/apps/org.dupot.easyflatpak.png
      - install -Dm644 export/flatpak/48x48.png $FLATPAK_DEST/share/icons/hicolor/48x48/apps/org.dupot.easyflatpak.png
      - install -Dm644 export/flatpak/64x64.png $FLATPAK_DEST/share/icons/hicolor/64x64/apps/org.dupot.easyflatpak.png
      - install -Dm644 export/flatpak/512x512.png $FLATPAK_DEST/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      - install -Dm644 export/flatpak/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop

    sources:
      - type: git
        url: https://github.com/imikado/dupotEasyFlatpak
        tag: 4.1.0
        commit: e8f9b1be0c95ac232a6d8bc90ce35f040ed21fd5

      - type: script
        dest-filename: dupot_easy_flatpak.sh
        commands:
          - cd /app/share/dupot_easy_flatpak/src
          - exec python3 main.py
